<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Faith and service memorial card</title>
  <desc id="desc">A memorial quote card about a life lived for the Lord and in service to others.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#324238" />
      <stop offset="100%" stop-color="#aab59d" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" rx="36" />
  <circle cx="214" cy="184" r="70" fill="#f8f0e7" fill-opacity="0.16" />
  <text x="120" y="176" font-family="Georgia, serif" font-size="30" fill="#f7efe4">FAITH AND SERVICE</text>
  <text x="120" y="370" font-family="Georgia, serif" font-size="74" fill="#fff9f1">"You lived for the</text>
  <text x="120" y="456" font-family="Georgia, serif" font-size="74" fill="#fff9f1">Lord and lit up</text>
  <text x="120" y="542" font-family="Georgia, serif" font-size="74" fill="#fff9f1">many lives."</text>
  <text x="120" y="700" font-family="Georgia, serif" font-size="30" fill="#eff5e9">Drawn from the public memorial messages mirrored from ForeverMissed</text>
</svg>
