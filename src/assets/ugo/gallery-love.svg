<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Loved beyond words memorial card</title>
  <desc id="desc">A remembrance card about being loved beyond words and missed beyond measure.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d4737" />
      <stop offset="100%" stop-color="#e0bb9a" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" rx="36" />
  <text x="120" y="176" font-family="Georgia, serif" font-size="30" fill="#fff5ec">LOVE AND REMEMBRANCE</text>
  <text x="120" y="364" font-family="Georgia, serif" font-size="82" fill="#fff9f2">Loved beyond words,</text>
  <text x="120" y="456" font-family="Georgia, serif" font-size="82" fill="#fff9f2">missed beyond</text>
  <text x="120" y="548" font-family="Georgia, serif" font-size="82" fill="#fff9f2">measure.</text>
</svg>
