<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Family legacy memorial card</title>
  <desc id="desc">A memorial quote card about love, family, and generosity.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a2d2a" />
      <stop offset="100%" stop-color="#c88f72" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" rx="36" />
  <text x="120" y="176" font-family="Georgia, serif" font-size="30" fill="#fff4ed">FAMILY LOVE AND GENEROSITY</text>
  <text x="120" y="340" font-family="Georgia, serif" font-size="72" fill="#fffaf6">"Your love lives on.</text>
  <text x="120" y="426" font-family="Georgia, serif" font-size="72" fill="#fffaf6">Your works live on.</text>
  <text x="120" y="512" font-family="Georgia, serif" font-size="72" fill="#fffaf6">Your touch lives on."</text>
  <text x="120" y="668" font-family="Georgia, serif" font-size="30" fill="#ffe7da">Built from themes repeated across family tributes on the memorial page</text>
</svg>
