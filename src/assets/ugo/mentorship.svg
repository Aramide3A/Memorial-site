<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Mentorship memorial card</title>
  <desc id="desc">A memorial quote card about wisdom, kindness, and professional impact.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7c29e" />
      <stop offset="52%" stop-color="#b47d4a" />
      <stop offset="100%" stop-color="#56382b" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" rx="36" />
  <text x="120" y="176" font-family="Georgia, serif" font-size="30" fill="#fff6ed">MENTORSHIP AND EXCELLENCE</text>
  <text x="120" y="340" font-family="Georgia, serif" font-size="70" fill="#fffaf4">"A beacon of wisdom,</text>
  <text x="120" y="422" font-family="Georgia, serif" font-size="70" fill="#fffaf4">kindness, and</text>
  <text x="120" y="504" font-family="Georgia, serif" font-size="70" fill="#fffaf4">inspiration."</text>
  <text x="120" y="664" font-family="Georgia, serif" font-size="30" fill="#fff0df">Echoing the language used by colleagues and mentees on the memorial wall</text>
</svg>
